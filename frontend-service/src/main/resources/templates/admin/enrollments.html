<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/admin-layout}">
<head>
    <title>Enrollment Management | Admin Dashboard</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <div>
                <h1 class="h3 mb-0 fw-bold text-dark">Enrollments</h1>
                <p class="text-muted small mb-0">Track student progress and access</p>
            </div>
            <div>
                <button class="btn btn-outline-primary rounded-pill px-4 shadow-sm">
                    <i class="bi bi-download me-2"></i> Export CSV
                </button>
            </div>
        </div>

        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <div th:if="${errorMessage != null}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

        <div class="card shadow-sm border-0 rounded-4 mb-4">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
                <form method="get" th:action="@{/admin/enrollments}" class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label class="form-label small fw-bold text-muted mb-1">Search</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" name="q" class="form-control bg-light border-0" placeholder="Student ID or Course ID...">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted mb-1">Status</label>
                        <select name="status" class="form-select bg-light border-0">
                            <option value="">All Statuses</option>
                            <option value="ACTIVE" th:selected="${param.status != null and param.status[0] == 'ACTIVE'}">Active</option>
                            <option value="COMPLETED" th:selected="${param.status != null and param.status[0] == 'COMPLETED'}">Completed</option>
                            <option value="DROPPED" th:selected="${param.status != null and param.status[0] == 'DROPPED'}">Dropped</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary w-100 rounded-pill">Filter</button>
                    </div>
                </form>
            </div>
            
            <div class="card-body p-0 mt-4">
                <div class="table-responsive">
                    <table class="table table-custom table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">Student ID</th>
                                <th>Course ID</th>
                                <th>Progress</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${enrollmentsPage == null or enrollmentsPage.content.empty}">
                                <td colspan="5" class="text-center py-5">
                                    <div class="text-muted">
                                        <i class="bi bi-journal-x" style="font-size: 3rem;"></i>
                                        <p class="mt-2">No enrollments found.</p>
                                    </div>
                                </td>
                            </tr>
                            <tr th:each="enrollment : ${enrollmentsPage?.content}">
                                <td class="ps-4 fw-medium text-dark" th:text="${#strings.substring(enrollment.studentId, 0, 8)}">Student</td>
                                <td th:text="${#strings.substring(enrollment.courseId, 0, 8)}">Course</td>
                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <div class="progress flex-grow-1" style="height: 6px; max-width: 100px;">
                                            <div class="progress-bar bg-primary rounded-pill" role="progressbar" th:style="'width: ' + ${enrollment.progressPercentage} + '%'"></div>
                                        </div>
                                        <span class="small text-muted fw-bold" th:text="${enrollment.progressPercentage} + '%'"></span>
                                    </div>
                                </td>
                                <td>
                                    <span th:if="${enrollment.status == 'ACTIVE'}" class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 rounded-pill px-3">Active</span>
                                    <span th:if="${enrollment.status == 'COMPLETED'}" class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 rounded-pill px-3">Completed</span>
                                    <span th:if="${enrollment.status == 'DROPPED'}" class="badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25 rounded-pill px-3">Dropped</span>
                                </td>
                                <td>
                                    <button class="btn btn-light btn-sm rounded-circle"><i class="bi bi-eye text-primary"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- Pagination -->
            <div class="card-footer bg-white border-top-0 py-3 d-flex justify-content-between align-items-center" th:if="${enrollmentsPage != null and enrollmentsPage.totalPages > 1}">
                <span class="text-muted small">Showing page <span th:text="${currentPage + 1}"></span> of <span th:text="${enrollmentsPage.totalPages}"></span></span>
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                            <a class="page-link rounded-pill px-3 me-2" th:href="@{/admin/enrollments(page=${currentPage - 1})}">Previous</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == enrollmentsPage.totalPages - 1 ? 'disabled' : ''}">
                            <a class="page-link rounded-pill px-3" th:href="@{/admin/enrollments(page=${currentPage + 1})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</body>
</html>
