<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/admin-layout}">
<head>
    <title>User Management | Admin Dashboard</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <div>
                <h1 class="h3 mb-0 fw-bold text-dark">User Management</h1>
                <p class="text-muted small mb-0">Manage students and tutors</p>
            </div>
            <div>
                <button class="btn btn-primary rounded-pill px-4 shadow-sm">
                    <i class="bi bi-person-plus me-2"></i> Add User
                </button>
            </div>
        </div>

        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <div th:if="${errorMessage != null}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>
        <div th:if="${successMessage != null}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>

        <div class="card shadow-sm border-0 rounded-4 mb-4">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
                <form method="get" th:action="@{/admin/users}" class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted mb-1">Search</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" name="q" class="form-control bg-light border-0" placeholder="Name or Email...">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold text-muted mb-1">Role</label>
                        <select name="role" class="form-select bg-light border-0">
                            <option value="">All Roles</option>
                            <option value="STUDENT" th:selected="${param.role != null and param.role[0] == 'STUDENT'}">Student</option>
                            <option value="TUTOR" th:selected="${param.role != null and param.role[0] == 'TUTOR'}">Tutor</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold text-muted mb-1">Status</label>
                        <select name="status" class="form-select bg-light border-0">
                            <option value="">All Statuses</option>
                            <option value="ACTIVE" th:selected="${param.status != null and param.status[0] == 'ACTIVE'}">Active</option>
                            <option value="SUSPENDED" th:selected="${param.status != null and param.status[0] == 'SUSPENDED'}">Suspended</option>
                            <option value="PENDING" th:selected="${param.status != null and param.status[0] == 'PENDING'}">Pending</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100 rounded-pill">Filter</button>
                    </div>
                </form>
            </div>
            
            <div class="card-body p-0 mt-4">
                <div class="table-responsive">
                    <table class="table table-custom table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">User</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${usersPage == null or usersPage.content.empty}">
                                <td colspan="4" class="text-center py-5">
                                    <div class="text-muted">
                                        <i class="bi bi-people" style="font-size: 3rem;"></i>
                                        <p class="mt-2">No users found.</p>
                                    </div>
                                </td>
                            </tr>
                            <tr th:each="user : ${usersPage?.content}">
                                <td class="ps-4">
                                    <div class="d-flex align-items-center">
                                        <img th:if="${user.profileImageUrl != null}" th:src="${user.profileImageUrl}" class="rounded-circle me-3" style="width: 40px; height: 40px; object-fit: cover;">
                                        <div th:unless="${user.profileImageUrl != null}" class="bg-primary text-white rounded-circle me-3 d-flex align-items-center justify-content-center fw-bold" style="width: 40px; height: 40px;">
                                            <span th:text="${#strings.substring(user.firstName,0,1)}">U</span>
                                        </div>
                                        <div>
                                            <h6 class="mb-0 fw-bold" th:text="${user.firstName != null ? user.firstName + ' ' + user.lastName : 'New User'}">John Doe</h6>
                                            <small class="text-muted" th:text="${user.email}">user@example.com</small>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <span class="badge bg-light text-dark border" th:text="${user.role != null ? user.role.replace('ROLE_', '') : 'STUDENT'}">Student</span>
                                </td>
                                <td>
                                    <span class="badge rounded-pill px-3" 
                                          th:classappend="${user.accountStatus == 'ACTIVE' ? 'bg-success' : (user.accountStatus == 'SUSPENDED' ? 'bg-warning text-dark' : 'bg-secondary')}"
                                          th:text="${user.accountStatus}">Active</span>
                                </td>
                                <td>
                                    <div class="dropdown">
                                        <button class="btn btn-light btn-sm rounded-circle" type="button" data-bs-toggle="dropdown">
                                            <i class="bi bi-three-dots-vertical"></i>
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
                                            <li><a class="dropdown-item" href="#"><i class="bi bi-eye me-2 text-primary"></i> View Profile</a></li>
                                            <li><hr class="dropdown-divider"></li>
                                            <li>
                                                <form th:action="@{/admin/users/{id}/deactivate(id=${user.authUserId})}" method="post">
                                                    <button type="submit" class="dropdown-item text-warning"><i class="bi bi-pause-circle me-2"></i> Suspend</button>
                                                </form>
                                            </li>
                                            <li>
                                                <form th:action="@{/admin/users/{id}/activate(id=${user.authUserId})}" method="post">
                                                    <button type="submit" class="dropdown-item text-success"><i class="bi bi-play-circle me-2"></i> Activate</button>
                                                </form>
                                            </li>
                                            <li><hr class="dropdown-divider"></li>
                                            <li>
                                                <button class="dropdown-item text-danger"><i class="bi bi-trash me-2"></i> Delete</button>
                                            </li>
                                        </ul>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- Pagination -->
            <div class="card-footer bg-white border-top-0 py-3 d-flex justify-content-between align-items-center" th:if="${usersPage != null and usersPage.totalPages > 1}">
                <span class="text-muted small">Showing page <span th:text="${currentPage + 1}"></span> of <span th:text="${usersPage.totalPages}"></span></span>
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                            <a class="page-link rounded-pill px-3 me-2" th:href="@{/admin/users(page=${currentPage - 1})}">Previous</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == usersPage.totalPages - 1 ? 'disabled' : ''}">
                            <a class="page-link rounded-pill px-3" th:href="@{/admin/users(page=${currentPage + 1})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</body>
</html>
