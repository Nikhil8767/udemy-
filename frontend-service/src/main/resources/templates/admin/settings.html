<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/admin-layout}">
<head>
    <title>Platform Settings | Admin Dashboard</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <div>
                <h1 class="h3 mb-0 fw-bold text-dark">Platform Settings</h1>
                <p class="text-muted small mb-0">Configure global platform options</p>
            </div>
        </div>

        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <div th:if="${errorMessage != null}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>
        <div th:if="${successMessage != null}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>

        <div class="card shadow-sm border-0 rounded-4 mb-4">
            <div class="card-body p-4">
                <form method="post" th:action="@{/admin/settings/update}">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Platform Name</label>
                            <input type="text" name="settings['platform_name']" class="form-control bg-light" 
                                   th:value="${settings != null ? settings['platform_name'] : 'Enterprise LMS'}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Support Email</label>
                            <input type="email" name="settings['support_email']" class="form-control bg-light" 
                                   th:value="${settings != null ? settings['support_email'] : 'support@enterpriselms.com'}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Default Language</label>
                            <select name="settings['default_language']" class="form-select bg-light">
                                <option value="en" th:selected="${settings != null and settings['default_language'] == 'en'}">English</option>
                                <option value="es" th:selected="${settings != null and settings['default_language'] == 'es'}">Spanish</option>
                                <option value="fr" th:selected="${settings != null and settings['default_language'] == 'fr'}">French</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Pagination Size</label>
                            <input type="number" name="settings['pagination_size']" class="form-control bg-light" 
                                   th:value="${settings != null ? settings['pagination_size'] : '10'}">
                        </div>
                        <div class="col-12 mt-4 pt-3 border-top">
                            <h5 class="fw-bold mb-3">Feature Flags</h5>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch fs-5">
                                <input class="form-check-input" type="checkbox" role="switch" id="maintenanceMode" 
                                       name="settings['maintenance_mode']" value="true"
                                       th:checked="${settings != null and settings['maintenance_mode'] == 'true'}">
                                <label class="form-check-label fs-6 fw-bold ms-2" for="maintenanceMode">Maintenance Mode</label>
                                <div class="form-text mt-0 fs-6">Disable access for non-admin users</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch fs-5">
                                <input class="form-check-input" type="checkbox" role="switch" id="studentReg" 
                                       name="settings['student_registration_enabled']" value="true"
                                       th:checked="${settings != null and settings['student_registration_enabled'] == 'true'}">
                                <label class="form-check-label fs-6 fw-bold ms-2" for="studentReg">Student Registration</label>
                                <div class="form-text mt-0 fs-6">Allow new students to sign up</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch fs-5">
                                <input class="form-check-input" type="checkbox" role="switch" id="tutorReg" 
                                       name="settings['tutor_registration_enabled']" value="true"
                                       th:checked="${settings != null and settings['tutor_registration_enabled'] == 'true'}">
                                <label class="form-check-label fs-6 fw-bold ms-2" for="tutorReg">Tutor Registration</label>
                                <div class="form-text mt-0 fs-6">Allow new tutors to sign up</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch fs-5">
                                <input class="form-check-input" type="checkbox" role="switch" id="courseApproval" 
                                       name="settings['course_approval_required']" value="true"
                                       th:checked="${settings != null and settings['course_approval_required'] == 'true'}">
                                <label class="form-check-label fs-6 fw-bold ms-2" for="courseApproval">Course Approval</label>
                                <div class="form-text mt-0 fs-6">Require admin approval for new courses</div>
                            </div>
                        </div>
                        <div class="col-12 text-end mt-4">
                            <button type="submit" class="btn btn-primary rounded-pill px-5">Save Settings</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
