<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layouts/main-layout}">
<head>
    <title>Login</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <div class="auth-wrapper">
                <div class="text-center mb-4">
                    <i class="bi bi-person-circle display-4 text-primary"></i>
                    <h2 class="mt-2 h4 font-weight-bold">Welcome Back</h2>
                    <p class="text-muted">Sign in to your account</p>
                </div>
                
                <div th:replace="~{fragments/alerts :: alerts}"></div>
                
                <form th:action="@{/login}" th:object="${loginRequest}" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label fw-medium">Email Address</label>
                        <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="name@example.com" required>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    
                    <div class="mb-4">
                        <div class="d-flex justify-content-between">
                            <label for="password" class="form-label fw-medium">Password</label>
                            <a th:href="@{/forgot-password}" class="text-decoration-none small">Forgot password?</a>
                        </div>
                        <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Enter your password" required>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Sign In</button>
                </form>
                
                <div class="text-center mt-4 pt-3 border-top">
                    <p class="text-muted small">Don't have an account? <a th:href="@{/register}" class="text-primary text-decoration-none fw-medium">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
