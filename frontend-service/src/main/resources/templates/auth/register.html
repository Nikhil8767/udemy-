<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layouts/main-layout}">
<head>
    <title>Register</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <div class="auth-wrapper" style="max-width: 500px;">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus display-4 text-primary"></i>
                    <h2 class="mt-2 h4 font-weight-bold">Create an Account</h2>
                    <p class="text-muted">Join our enterprise learning platform</p>
                </div>
                
                <div th:replace="~{fragments/alerts :: alerts}"></div>
                
                <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                    
                    <div class="mb-3">
                        <label for="email" class="form-label fw-medium">Email Address</label>
                        <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="name@example.com" required>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label fw-medium">Password</label>
                        <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Create a password" required>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-medium">I am a...</label>
                        <select class="form-select" th:field="*{role}" required>
                            <option value="ROLE_STUDENT">Student</option>
                            <option value="ROLE_TUTOR">Tutor / Instructor</option>
                        </select>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Sign Up</button>
                </form>
                
                <div class="text-center mt-4 pt-3 border-top">
                    <p class="text-muted small">Already have an account? <a th:href="@{/login}" class="text-primary text-decoration-none fw-medium">Sign in here</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
