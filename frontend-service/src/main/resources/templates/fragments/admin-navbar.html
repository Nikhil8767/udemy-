<div th:fragment="navbar" class="admin-topbar" xmlns:th="http://www.thymeleaf.org">
    <!-- Global Search -->
    <div class="d-flex align-items-center" style="width: 400px;">
        <form class="w-100 position-relative" action="/admin/search" method="get">
            <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
            <input type="search" name="q" class="form-control rounded-pill bg-light border-0 ps-5" placeholder="Search students, courses, tutors...">
        </form>
    </div>
    
    <!-- Right Actions -->
    <div class="d-flex align-items-center gap-3">
        <!-- Date -->
        <div class="d-none d-md-block text-muted small fw-medium" th:text="${#dates.format(#dates.createNow(), 'MMM dd, yyyy')}">
            Oct 24, 2026
        </div>
        
        <div class="vr mx-1 bg-secondary opacity-25" style="height: 24px;"></div>
        
        <!-- Notifications -->
        <div class="dropdown">
            <button class="btn btn-light rounded-circle p-2 position-relative" type="button" id="notifDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-bell"></i>
                <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle">
                    <span class="visually-hidden">New alerts</span>
                </span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 pt-0" aria-labelledby="notifDropdown" style="width: 320px;">
                <li class="bg-light px-3 py-2 fw-bold border-bottom">Notifications</li>
                <li>
                    <a class="dropdown-item py-2 border-bottom" href="#">
                        <div class="d-flex gap-3">
                            <div class="text-primary"><i class="bi bi-person-plus-fill"></i></div>
                            <div>
                                <p class="mb-0 small fw-medium">New Tutor Registered</p>
                                <p class="mb-0 text-muted" style="font-size: 0.75rem;">2 minutes ago</p>
                            </div>
                        </div>
                    </a>
                </li>
                <li><a class="dropdown-item text-center small text-primary fw-medium py-2" href="#">View All</a></li>
            </ul>
        </div>
        
        <!-- Profile Dropdown -->
        <div class="dropdown">
            <button class="btn border-0 p-0 d-flex align-items-center gap-2" type="button" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold" style="width: 38px; height: 38px;">
                    A
                </div>
                <div class="d-none d-md-block text-start">
                    <div class="fw-bold lh-1 text-dark" style="font-size: 0.9rem;">Administrator</div>
                    <div class="text-muted" style="font-size: 0.75rem;">Super Admin</div>
                </div>
                <i class="bi bi-chevron-down text-muted ms-1" style="font-size: 0.8rem;"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="profileDropdown">
                <li><a class="dropdown-item py-2" th:href="@{/admin/profile}"><i class="bi bi-person me-2 text-muted"></i> My Profile</a></li>
                <li><a class="dropdown-item py-2" th:href="@{/admin/settings}"><i class="bi bi-gear me-2 text-muted"></i> Settings</a></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="dropdown-item py-2 text-danger"><i class="bi bi-box-arrow-right me-2"></i> Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</div>
