<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layouts/main-layout}">
<head>
    <title>404 Not Found</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container text-center py-5 mt-5">
            <h1 class="display-1 fw-bold text-primary">404</h1>
            <h2 class="mb-4">Page Not Found</h2>
            <p class="lead text-muted mb-5">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
            <a th:href="@{/}" class="btn btn-primary btn-lg"><i class="bi bi-house-door me-2"></i>Return to Home</a>
        </div>
    </div>
</body>
</html>
