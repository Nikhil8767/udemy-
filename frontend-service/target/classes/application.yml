server:
  port: 8085

spring:
  application:
    name: frontend-service
  jmx:
    enabled: false
  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html
  security:
    user:
      name: user
      password: password

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Feign Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: full

# API Gateway URL config
app:
  api:
    base-url: http://localhost:8080/api/v1
