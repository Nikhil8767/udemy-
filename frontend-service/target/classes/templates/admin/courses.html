<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/admin-layout}">
<head>
    <title>Course Management | Admin Dashboard</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <div>
                <h1 class="h3 mb-0 fw-bold text-dark">Course Management</h1>
                <p class="text-muted small mb-0">Manage platform courses and lifecycles</p>
            </div>
            <div>
                <button class="btn btn-outline-primary rounded-pill px-4 shadow-sm">
                    <i class="bi bi-funnel me-2"></i> Advanced Filters
                </button>
            </div>
        </div>

        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <div th:if="${errorMessage != null}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>
        <div th:if="${successMessage != null}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>

        <div class="card shadow-sm border-0 rounded-4 mb-4">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
                <form method="get" th:action="@{/admin/courses}" class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label class="form-label small fw-bold text-muted mb-1">Search</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" name="q" class="form-control bg-light border-0" placeholder="Course Title or Category...">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted mb-1">Status</label>
                        <select name="status" class="form-select bg-light border-0">
                            <option value="">All Statuses</option>
                            <option value="PUBLISHED" th:selected="${param.status != null and param.status[0] == 'PUBLISHED'}">Published</option>
                            <option value="DRAFT" th:selected="${param.status != null and param.status[0] == 'DRAFT'}">Draft</option>
                            <option value="ARCHIVED" th:selected="${param.status != null and param.status[0] == 'ARCHIVED'}">Archived</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary w-100 rounded-pill">Filter</button>
                    </div>
                </form>
            </div>
            
            <div class="card-body p-0 mt-4">
                <div class="table-responsive">
                    <table class="table table-custom table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">Course</th>
                                <th>Status</th>
                                <th>Featured</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${coursesPage == null or coursesPage.content.empty}">
                                <td colspan="4" class="text-center py-5">
                                    <div class="text-muted">
                                        <i class="bi bi-journal-x" style="font-size: 3rem;"></i>
                                        <p class="mt-2">No courses found.</p>
                                    </div>
                                </td>
                            </tr>
                            <tr th:each="course : ${coursesPage?.content}">
                                <td class="ps-4">
                                    <div class="d-flex align-items-center">
                                        <div class="bg-primary text-white rounded me-3 d-flex align-items-center justify-content-center" style="width: 48px; height: 36px;">
                                            <i class="bi bi-play-fill"></i>
                                        </div>
                                        <div>
                                            <h6 class="mb-0 fw-bold text-dark" th:text="${course.title}">Course Title</h6>
                                            <small class="text-muted" th:text="'Tutor ID: ' + ${#strings.substring(course.instructorId, 0, 8)}">Tutor</small>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <span th:if="${course.courseStatus == 'PUBLISHED'}" class="badge bg-success rounded-pill px-3">Published</span>
                                    <span th:if="${course.courseStatus == 'DRAFT'}" class="badge bg-warning rounded-pill px-3 text-dark">Draft</span>
                                    <span th:if="${course.courseStatus == 'ARCHIVED'}" class="badge bg-secondary rounded-pill px-3">Archived</span>
                                </td>
                                <td>
                                    <span th:if="${course.featured}" class="badge bg-primary rounded-pill px-2"><i class="bi bi-star-fill text-warning"></i> Yes</span>
                                    <span th:unless="${course.featured}" class="text-muted small">No</span>
                                </td>
                                <td>
                                    <div class="dropdown">
                                        <button class="btn btn-light btn-sm rounded-circle" type="button" data-bs-toggle="dropdown">
                                            <i class="bi bi-three-dots-vertical"></i>
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
                                            <li><a class="dropdown-item" href="#"><i class="bi bi-eye me-2 text-primary"></i> View Details</a></li>
                                            <li><hr class="dropdown-divider"></li>
                                            <li>
                                                <form th:action="@{/admin/courses/{id}/publish(id=${course.id})}" method="post">
                                                    <button type="submit" class="dropdown-item text-success"><i class="bi bi-check-circle me-2"></i> Publish</button>
                                                </form>
                                            </li>
                                            <li>
                                                <form th:action="@{/admin/courses/{id}/archive(id=${course.id})}" method="post">
                                                    <button type="submit" class="dropdown-item text-warning"><i class="bi bi-archive me-2"></i> Archive</button>
                                                </form>
                                            </li>
                                            <li><hr class="dropdown-divider"></li>
                                            <li>
                                                <button class="dropdown-item text-danger"><i class="bi bi-trash me-2"></i> Delete</button>
                                            </li>
                                        </ul>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- Pagination -->
            <div class="card-footer bg-white border-top-0 py-3 d-flex justify-content-between align-items-center" th:if="${coursesPage != null and coursesPage.totalPages > 1}">
                <span class="text-muted small">Showing page <span th:text="${currentPage + 1}"></span> of <span th:text="${coursesPage.totalPages}"></span></span>
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                            <a class="page-link rounded-pill px-3 me-2" th:href="@{/admin/courses(page=${currentPage - 1})}">Previous</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == coursesPage.totalPages - 1 ? 'disabled' : ''}">
                            <a class="page-link rounded-pill px-3" th:href="@{/admin/courses(page=${currentPage + 1})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</body>
</html>
