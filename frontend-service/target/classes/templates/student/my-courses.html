<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/dashboard-layout}">
<head>
    <title>My Courses</title>
</head>
<body>
    <main layout:fragment="content">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">My Learning</h1>
        </div>
        
        <!-- Alerts -->
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        
        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
            <div th:each="myCourse : ${myCourses}" class="col">
                <div class="card h-100 shadow-sm border-0">
                    <img th:if="${myCourse.course.thumbnailUrl != null}" th:src="${myCourse.course.thumbnailUrl}" class="card-img-top" alt="Course Thumbnail" style="height: 180px; object-fit: cover;">
                    <img th:unless="${myCourse.course.thumbnailUrl != null}" src="https://via.placeholder.com/300x180?text=No+Thumbnail" class="card-img-top" alt="Course Thumbnail">
                    
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold" th:text="${myCourse.course.title}">Course Title</h5>
                        
                        <div class="mt-auto pt-3">
                            <div class="d-flex justify-content-between text-muted small mb-1">
                                <span><span th:text="${myCourse.enrollment.progressPercentage}">0</span>% Complete</span>
                                <span th:text="${myCourse.enrollment.completedLessons + '/' + myCourse.enrollment.totalLessons + ' Lessons'}">0/10 Lessons</span>
                            </div>
                            <div class="progress mb-3" style="height: 6px;">
                                <div class="progress-bar bg-success" role="progressbar" th:style="'width: ' + ${myCourse.enrollment.progressPercentage} + '%'" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
                            </div>
                            <a th:href="@{/courses/{id}/learn(id=${myCourse.course.id})}" class="btn btn-primary w-100">Continue Learning</a>
                        </div>
                    </div>
                </div>
            </div>
            
            <div th:if="${myCourses == null || myCourses.empty}" class="col-12">
                <div class="alert alert-info text-center" role="alert">
                    <i class="bi bi-info-circle me-2"></i> You are not enrolled in any courses yet. 
                    <a th:href="@{/student/courses}" class="alert-link">Browse courses</a> to start learning!
                </div>
            </div>
        </div>
    </main>
</body>
</html>
